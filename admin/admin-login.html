<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin Login — B.A.R.D</title>
  <link rel="stylesheet" href="../style.css" />
</head>
<body>
  <div class="wrap panel">
    <h1>Admin Login</h1>
    <form onsubmit="return login()">
      <label>Username<br><input id="u" autocomplete="username"></label><br><br>
      <label>Password<br><input id="p" type="password" autocomplete="current-password"></label><br><br>
      <button class="btn">Login</button>
    </form>
    <p class="meta">Default credentials: Admin / Areyouadmin?</p>
  </div>
  <script>
    function login(){
      const u=document.getElementById('u').value.trim();
      const p=document.getElementById('p').value;
      if(u==='Admin' && p==='Areyouadmin?'){
        location.href='admin-dashboard.html';
        return false;
      }
      alert('Wrong login');
      return false;
    }
  </script>
</body>
</html>
